<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sloosh — Установка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf8;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #1a1a1a;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px 24px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #c8e6a0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .info h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .info p {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: #9db93f;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: -0.1px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:active {
      background: #8ca635;
    }

    .note {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">💧</div>
    <div class="info">
      <h1>sloosh</h1>
      <p>Установи приложение на свой iPhone</p>
    </div>
    <a class="btn" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/sluvskii/installcertipa/main/manifest/sloosh.plist">
      Установить
    </a>
    <span class="note">Открывай в Safari · iOS</span>
  </div>
</body>
</html>
