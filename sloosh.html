<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sloosh — Установка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 48px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      width: 90%;
      max-width: 380px;
      text-align: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.4);
      font-size: 44px;
    }

    .info h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .info p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 14px;
      text-decoration: none;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.35);
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .note {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌊</div>
    <div class="info">
      <h1>Sloosh</h1>
      <p>Приложение для iPhone. Открывай в Safari.</p>
    </div>
    <a class="btn" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/sluvskii/installcertipa/main/manifest/sloosh.plist">
      Установить
    </a>
    <span class="note">Только Safari · iOS</span>
  </div>
</body>
</html>
